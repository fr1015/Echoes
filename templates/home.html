<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム | MySNS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f0;
      --surface: #ffffff;
      --surface-hover: #f7f8f3;
      --border: #e2e6d8;
      --border-light: #ecefe6;
      --text-primary: #1a1e14;
      --text-secondary: #626b55;
      --text-muted: #9aa38a;
      --accent: #6a9e2f;
      --accent-hover: #5a8a24;
      --accent-light: #eef5e0;
      --accent-muted: #bdd98a;
      --sidebar-w: 220px;
      --rightbar-w: 300px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr var(--rightbar-w);
      min-height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ===== LEFT SIDEBAR ===== */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      gap: 4px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 14px;
      transition: all 0.15s ease;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }

    .nav-item .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .sidebar-spacer { flex: 1; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .user-info:hover { background: var(--surface-hover); }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-muted), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .avatar.sm { width: 40px; height: 40px; font-size: 15px; }

    .user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .user-handle { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    /* ===== MAIN ===== */
    .main {
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    .main-header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      z-index: 10;
    }

    .main-header h1 { font-size: 17px; font-weight: 700; color: var(--text-primary); }

    .composer {
      padding: 20px 24px;
      border-bottom: 8px solid var(--border-light);
    }

    .composer-inner { display: flex; gap: 12px; }

    .composer-body { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .composer textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 90px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    .composer textarea:focus { border-color: var(--accent-muted); background: white; }
    .composer textarea::placeholder { color: var(--text-muted); }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .char-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    .submit-btn {
      padding: 9px 22px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: var(--accent-hover); }

    .tl-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      color: var(--text-muted);
      gap: 10px;
    }

    .tl-empty-icon { font-size: 36px; opacity: 0.4; }
    .tl-empty-text { font-size: 14px; }

    /* ===== RIGHT SIDEBAR ===== */
    .rightbar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      background: var(--bg);
      gap: 16px;
      overflow-y: auto;
    }

    .rightbar::-webkit-scrollbar { width: 4px; }
    .rightbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .widget {
      background: var(--surface);
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
    }

    .widget-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* ===== HEATMAP ===== */
    .heatmap-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 10px;
      margin-top: -6px;
    }

    .heatmap-outer { width: 100%; overflow: hidden; }

    /* grid layout は JS で設定 */
    .heatmap-grid { display: grid; gap: 3px; width: 100%; }

    .heatmap-cell {
      border-radius: 2px;
      background: var(--border-light);
      cursor: default;
      position: relative;
      transition: transform 0.1s;
    }

    .heatmap-cell:hover { transform: scale(1.3); z-index: 1; }

    .heatmap-cell .tooltip {
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,30,20,0.88);
      color: white;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 10px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: 'DM Mono', monospace;
      z-index: 100;
    }

    .heatmap-cell:hover .tooltip { opacity: 1; }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      justify-content: flex-end;
    }

    .heatmap-legend span { font-size: 10px; color: var(--text-muted); }

    .legend-cell { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Memo */
    .memo-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      resize: vertical;
      min-height: 80px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      line-height: 1.6;
      transition: border-color 0.15s;
    }

    .memo-textarea:focus { border-color: var(--accent-muted); background: white; }

    .memo-actions { display: flex; gap: 8px; margin-top: 8px; }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 7px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border-light); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    .rightbar-spacer { flex: 1; }

    .post-btn-right {
      width: 100%;
      padding: 13px;
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .post-btn-right:hover { background: #333; }
  </style>
</head>
<body>
<div class="layout">

  <!-- ===== LEFT SIDEBAR ===== -->
  <aside class="sidebar">
    <a class="logo" href="#">
      <div class="logo-icon">🌿</div>
      <span class="logo-text">MySNS</span>
    </a>

    <a class="nav-item active" href="#">
      <span class="icon">🏠</span> タイムライン
    </a>
    <a class="nav-item" href="#">
      <span class="icon">📝</span> ポストログ
    </a>
    <a class="nav-item" href="#">
      <span class="icon">🗂️</span> ドライブ
    </a>

    <div class="sidebar-spacer"></div>

    <a class="user-info" href="#profile">
      <div class="avatar">K</div>
      <div>
        <div class="user-name">kan</div>
        <div class="user-handle">@lifelog_kan</div>
      </div>
    </a>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="main-header">
      <h1>タイムライン</h1>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <div class="avatar sm">K</div>
        <div class="composer-body">
          <textarea id="postText" placeholder="いまどうしてる？" maxlength="500" oninput="updateCharCount()"></textarea>
          <div class="composer-footer">
            <span class="char-count" id="charCount">0 / 500</span>
            <button class="submit-btn" onclick="submitPost()">ポストする</button>
          </div>
        </div>
      </div>
    </div>

    <div id="timeline">
      <div class="tl-empty">
        <div class="tl-empty-icon">🌱</div>
        <div class="tl-empty-text">まだ投稿はありません</div>
      </div>
    </div>
  </main>

  <!-- ===== RIGHT SIDEBAR ===== -->
  <aside class="rightbar">

    <div class="widget">
      <div class="widget-title">ポスト数ヒートマップ</div>
      <div class="heatmap-subtitle" id="heatmapRange"></div>
      <div class="heatmap-outer">
        <div class="heatmap-grid" id="heatmapGrid"></div>
      </div>

    </div>

    <div class="widget">
      <div class="widget-title">メモ帳</div>
      <textarea class="memo-textarea" id="memoText" placeholder="メモを入力..."></textarea>
      <div class="memo-actions">
        <button class="btn-sm btn-primary" id="saveMemoBtn" onclick="saveMemo()">保存</button>
        <button class="btn-sm btn-secondary" onclick="clearMemo()">クリア</button>
      </div>
    </div>

    <div class="rightbar-spacer"></div>

    <button class="post-btn-right" onclick="focusComposer()">ポストする</button>

  </aside>
</div>

<script>
// ===== CHAR COUNT =====
function updateCharCount() {
  const ta = document.getElementById("postText");
  document.getElementById("charCount").textContent = `${ta.value.length} / 500`;
}

// ===== SUBMIT =====
function submitPost() {
  const ta = document.getElementById("postText");
  if (!ta.value.trim()) return;
  ta.value = "";
  updateCharCount();
  addHeatmapPost();
}

function focusComposer() {
  document.getElementById("postText").focus();
  document.getElementById("postText").scrollIntoView({ behavior: "smooth", block: "center" });
}

// ===== MEMO =====
function saveMemo() {
  localStorage.setItem("memo", document.getElementById("memoText").value);
  const btn = document.getElementById("saveMemoBtn");
  btn.textContent = "保存済み ✓";
  setTimeout(() => btn.textContent = "保存", 1500);
}
function clearMemo() {
  document.getElementById("memoText").value = "";
  localStorage.removeItem("memo");
}
window.addEventListener("load", () => {
  const saved = localStorage.getItem("memo");
  if (saved) document.getElementById("memoText").value = saved;
});

// ===== HEATMAP =====
const heatmapData = {};
const today = new Date();

function dateKey(d) {
  return d.toISOString().split("T")[0];
}

// ダミーデータなし（DBから読み込む想定）

function addHeatmapPost() {
  buildHeatmap();
}

function buildHeatmap() {
  const container = document.getElementById("heatmapGrid");
  const outer = container.parentElement;
  const outerW = outer.clientWidth;

  const ROWS = 7;
  const COLS = 9; // 約2ヶ月分（9週）
  const gap = 4;
  // 利用可能な幅からセルサイズを逆算
  const cellSize = Math.max(8, Math.floor((outerW - gap * (COLS - 1)) / COLS));
  const totalW = cellSize * COLS + gap * (COLS - 1);

  container.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
  container.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;
  container.style.width = totalW + "px";
  container.innerHTML = "";

  const totalDays = COLS * ROWS;
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - (totalDays - 1));

  const fmt = d =>
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  document.getElementById("heatmapRange").textContent =
    `${fmt(startDate)} ～ ${fmt(today)}`;

  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      const d = new Date(startDate);
      d.setDate(d.getDate() + col * ROWS + row);

      const cell = document.createElement("div");
      cell.style.gridColumn = col + 1;
      cell.style.gridRow = row + 1;
      cell.style.width = cellSize + "px";
      cell.style.height = cellSize + "px";

      if (d > today) {
        container.appendChild(cell);
        continue;
      }

      const k = dateKey(d);
      const level = heatmapData[k] || 0;
      cell.className = "heatmap-cell";
      cell.innerHTML = `<span class="tooltip">${k}: ${level}件</span>`;
      container.appendChild(cell);
    }
  }
}

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildHeatmap, 80);
});

buildHeatmap();
</script>
</body>
</html>
