<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home | Echoes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/all.min.css">
  <link rel="stylesheet" href="../static/css/reset.css">
  <link rel="stylesheet" href="../static/css/common.css">
  <link rel="stylesheet" href="../static/css/home.css">
</head>
<body>

<!-- ===== ポストモーダル ===== -->
<div class="modal-overlay" id="postModal" onclick="handleModalOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">新しいポスト</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-composer">
      <div class="avatar sm"></div>
      <div class="modal-composer-body">
        <textarea id="modalPostText" placeholder="いまどうしてる？" maxlength="500" oninput="updateModalCharCount()"></textarea>
        <div class="modal-footer">
          <span class="char-count" id="modalCharCount">0 / 500</span>
          <button class="submit-btn" onclick="submitModalPost()">ポストする</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 左サイドバー ===== -->
<aside class="sidebar-left">
  <a class="logo" href="#">
    <div class="logo-icon"></div>
    <span class="logo-text">Echoes</span>
  </a>

  <a class="nav-item active" href="#">
    <span class="icon"><i class="fa-regular fa-house"></i></span><span class="nav-label"> タイムライン</span>
  </a>
  <a class="nav-item" href="#">
    <span class="icon"><i class="fa-regular fa-file-lines"></i></span><span class="nav-label"> ポストログ</span>
  </a>
  <a class="nav-item" href="#">
    <span class="icon"><i class="fa-regular fa-folder"></i></span><span class="nav-label"> ドライブ</span>
  </a>

  <div class="sidebar-spacer"></div>

  <a class="user-info" href="#profile">
    <span class="avatar nav-item"></span>
    <div> 
      <div class="user-name">sample</div>
      <div class="user-handle">@ID_sample</div>
    </div>
  </a>
</aside>

<!-- ===== メインコンテンツ ===== -->
<main class="main">
  <div class="main-header">
    <h1>タイムライン</h1>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <div class="avatar sm"></div>
      <div class="composer-body">
        <textarea id="postText" placeholder="いまどうしてる？" maxlength="500" oninput="updateCharCount()"></textarea>
        <div class="composer-footer">
          <span class="char-count" id="charCount">0 / 500</span>
          <button class="submit-btn" onclick="submitPost()">ポストする</button>
        </div>
      </div>
    </div>
  </div>

  <div id="timeline">
    <div class="tl-empty">
      <div class="tl-empty-text">まだ投稿はありません</div>
    </div>
  </div>
</main>

<!-- ===== 右サイドバー ===== -->
<aside class="sidebar-right">
  <div class="widget">
    <div class="widget-title">ポスト数ヒートマップ</div>
    <div class="heatmap-subtitle" id="heatmapRange"></div>
    <div class="heatmap-outer">
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
  </div>

  <div class="widget">
    <div class="widget-title">メモ帳</div>
    <textarea class="memo-textarea" id="memoText" placeholder="メモを入力..."></textarea>
    <div class="memo-actions">
      <button class="btn-sm btn-primary" id="saveMemoBtn" onclick="saveMemo()">保存</button>
      <button class="btn-sm btn-secondary" onclick="clearMemo()">クリア</button>
    </div>
  </div>

  <div class="sidebar-right-spacer"></div>

  <button class="post-btn-right" onclick="openModal()">ポストする</button>
</aside>

<!-- ===== スマホ：ボトムナビ ===== -->
<nav class="bottom-nav">
  <a class="bottom-nav-item active" href="#">
    <span class="bn-icon"><i class="fa-regular fa-house"></i></span><span>TL</span>
  </a>
  <a class="bottom-nav-item" href="#">
    <span class="bn-icon"><i class="fa-regular fa-file-lines"></i></span><span>ログ</span>
  </a>
  <a class="bottom-nav-item" href="#">
    <span class="bn-icon"><i class="fa-regular fa-folder"></i></span><span>ドライブ</span>
  </a>
  <a class="bottom-nav-item" href="#profile">
    <span class="bn-icon"><i class="fa-regular fa-user"></i></span><span>プロフィール</span>
  </a>
</nav>

<!-- ===== スマホ：FAB ===== -->
<button class="fab" onclick="openModal()" aria-label="ポストする"></button>

<script src="../static/js/home.js"></script>
</body>
</html>
