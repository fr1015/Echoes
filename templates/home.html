<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム | MySNS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #f4f5f0;
      --surface: #ffffff;
      --surface-hover: #f7f8f3;
      --border: #e2e6d8;
      --border-light: #ecefe6;
      --text-primary: #1a1e14;
      --text-secondary: #626b55;
      --text-muted: #9aa38a;
      --accent: #6a9e2f;
      --accent-hover: #5a8a24;
      --accent-light: #eef5e0;
      --accent-muted: #bdd98a;
      --sidebar-w: 220px;
      --rightbar-w: 300px;
      --bottombar-h: 60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ===== PC LAYOUT ===== */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr var(--rightbar-w);
      min-height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ===== LEFT SIDEBAR (PC) ===== */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      gap: 4px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 14px;
      transition: all 0.15s ease;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }

    .nav-item .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .sidebar-spacer { flex: 1; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .user-info:hover { background: var(--surface-hover); }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-muted), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .avatar.sm { width: 40px; height: 40px; font-size: 15px; }

    .user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .user-handle { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    /* ===== MAIN ===== */
    .main {
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    .main-header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      z-index: 10;
    }

    .main-header h1 { font-size: 17px; font-weight: 700; color: var(--text-primary); }

    /* ===== COMPOSER (PC inline) ===== */
    .composer {
      padding: 20px 24px;
      border-bottom: 8px solid var(--border-light);
    }

    .composer-inner { display: flex; gap: 12px; }
    .composer-body { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .composer textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 90px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    .composer textarea:focus { border-color: var(--accent-muted); background: white; }
    .composer textarea::placeholder { color: var(--text-muted); }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .char-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

    .submit-btn {
      padding: 9px 22px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: var(--accent-hover); }

    /* ===== TL EMPTY ===== */
    .tl-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      color: var(--text-muted);
      gap: 10px;
    }

    .tl-empty-icon { font-size: 36px; opacity: 0.4; }
    .tl-empty-text { font-size: 14px; }

    /* ===== RIGHT SIDEBAR ===== */
    .rightbar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      background: var(--bg);
      gap: 16px;
      overflow-y: auto;
    }

    .rightbar::-webkit-scrollbar { width: 4px; }
    .rightbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .widget {
      background: var(--surface);
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
    }

    .widget-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* ===== HEATMAP ===== */
    .heatmap-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 10px;
      margin-top: -6px;
    }

    .heatmap-outer { width: 100%; overflow: hidden; }
    .heatmap-grid { display: grid; }

    .heatmap-cell {
      border-radius: 2px;
      background: var(--border-light);
      cursor: default;
      position: relative;
      transition: transform 0.1s;
    }

    .heatmap-cell:hover { transform: scale(1.3); z-index: 1; }

    .heatmap-cell .tooltip {
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,30,20,0.88);
      color: white;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 10px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: 'DM Mono', monospace;
      z-index: 100;
    }

    .heatmap-cell:hover .tooltip { opacity: 1; }

    /* ===== MEMO ===== */
    .memo-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      resize: vertical;
      min-height: 80px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      line-height: 1.6;
      transition: border-color 0.15s;
    }

    .memo-textarea:focus { border-color: var(--accent-muted); background: white; }
    .memo-actions { display: flex; gap: 8px; margin-top: 8px; }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 7px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border-light); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    .rightbar-spacer { flex: 1; }

    .post-btn-right {
      width: 100%;
      padding: 13px;
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .post-btn-right:hover { background: #333; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.open { display: flex; }

    /* スマホでは画面下部からスライドアップ */
    .modal-box {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      width: 560px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title { font-size: 15px; font-weight: 700; }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--border-light);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      line-height: 1;
    }

    .modal-close:hover { background: var(--border); }

    .modal-composer { display: flex; gap: 12px; }
    .modal-composer-body { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .modal-composer textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 120px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    .modal-composer textarea:focus { border-color: var(--accent-muted); background: white; }
    .modal-composer textarea::placeholder { color: var(--text-muted); }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    /* ===== MOBILE BOTTOM NAV ===== */
    .bottom-nav {
      display: none; /* SP only */
    }

    /* ===== MOBILE FAB ===== */
    .fab {
      display: none; /* SP only */
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      /* PC要素を非表示 */
      .sidebar  { display: none; }
      .rightbar { display: none; }
      .composer { display: none; }

      /* レイアウトを1カラムに */
      .layout {
        grid-template-columns: 1fr;
        padding-bottom: var(--bottombar-h);
      }

      .main { border-right: none; }

      .main-header {
        padding: 14px 16px;
      }

      /* ===== BOTTOM NAV ===== */
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--bottombar-h);
        background: var(--surface);
        border-top: 1px solid var(--border);
        z-index: 100;
        align-items: center;
        justify-content: space-around;
        padding: 0 8px;
      }

      .bottom-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 6px 16px;
        border-radius: 10px;
        text-decoration: none;
        color: var(--text-muted);
        font-size: 10px;
        font-weight: 500;
        transition: color 0.15s;
        border: none;
        background: none;
        cursor: pointer;
        font-family: 'Noto Sans JP', sans-serif;
        flex: 1;
      }

      .bottom-nav-item .bn-icon { font-size: 20px; line-height: 1; }
      .bottom-nav-item.active { color: var(--accent); }
      .bottom-nav-item:hover { color: var(--text-primary); }

      /* ===== FAB ===== */
      .fab {
        display: flex;
        position: fixed;
        bottom: calc(var(--bottombar-h) + 16px);
        right: 20px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        border: none;
        font-size: 22px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(106,158,47,0.45);
        z-index: 200;
        transition: background 0.15s, transform 0.15s;
      }

      .fab:hover { background: var(--accent-hover); transform: scale(1.08); }
      .fab:active { transform: scale(0.95); }

      /* モバイルモーダルは下からスライドアップ */
      .modal-overlay { align-items: flex-end; }

      .modal-box {
        width: 100%;
        max-width: 100%;
        border-radius: 20px 20px 0 0;
        padding: 20px 16px 32px;
        animation: modalSlideUp 0.25s ease;
      }

      @keyframes modalSlideUp {
        from { opacity: 0; transform: translateY(100%); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* モバイル用TLパディング */
      .tl-empty { padding: 60px 16px; }
    }
  </style>
</head>
<body>

<!-- ===== POST MODAL (共通) ===== -->
<div class="modal-overlay" id="postModal" onclick="handleModalOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">新しいポスト</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-composer">
      <div class="avatar sm">K</div>
      <div class="modal-composer-body">
        <textarea id="modalPostText" placeholder="いまどうしてる？" maxlength="500" oninput="updateModalCharCount()"></textarea>
        <div class="modal-footer">
          <span class="char-count" id="modalCharCount">0 / 500</span>
          <button class="submit-btn" onclick="submitModalPost()">ポストする</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="layout">

  <!-- ===== LEFT SIDEBAR (PC) ===== -->
  <aside class="sidebar">
    <a class="logo" href="#">
      <div class="logo-icon">🌿</div>
      <span class="logo-text">MySNS</span>
    </a>

    <a class="nav-item active" href="#">
      <span class="icon">🏠</span> タイムライン
    </a>
    <a class="nav-item" href="#">
      <span class="icon">📝</span> ポストログ
    </a>
    <a class="nav-item" href="#">
      <span class="icon">🗂️</span> ドライブ
    </a>

    <div class="sidebar-spacer"></div>

    <a class="user-info" href="#profile">
      <div class="avatar">K</div>
      <div>
        <div class="user-name">kan</div>
        <div class="user-handle">@lifelog_kan</div>
      </div>
    </a>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="main-header">
      <h1>タイムライン</h1>
    </div>

    <!-- PC: インラインコンポーザー -->
    <div class="composer">
      <div class="composer-inner">
        <div class="avatar sm">K</div>
        <div class="composer-body">
          <textarea id="postText" placeholder="いまどうしてる？" maxlength="500" oninput="updateCharCount()"></textarea>
          <div class="composer-footer">
            <span class="char-count" id="charCount">0 / 500</span>
            <button class="submit-btn" onclick="submitPost()">ポストする</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TL -->
    <div id="timeline">
      <div class="tl-empty">
        <div class="tl-empty-icon">🌱</div>
        <div class="tl-empty-text">まだ投稿はありません</div>
      </div>
    </div>
  </main>

  <!-- ===== RIGHT SIDEBAR (PC) ===== -->
  <aside class="rightbar">

    <div class="widget">
      <div class="widget-title">ポスト数ヒートマップ</div>
      <div class="heatmap-subtitle" id="heatmapRange"></div>
      <div class="heatmap-outer">
        <div class="heatmap-grid" id="heatmapGrid"></div>
      </div>
    </div>

    <div class="widget">
      <div class="widget-title">メモ帳</div>
      <textarea class="memo-textarea" id="memoText" placeholder="メモを入力..."></textarea>
      <div class="memo-actions">
        <button class="btn-sm btn-primary" id="saveMemoBtn" onclick="saveMemo()">保存</button>
        <button class="btn-sm btn-secondary" onclick="clearMemo()">クリア</button>
      </div>
    </div>

    <div class="rightbar-spacer"></div>

    <!-- PC: ポストするボタン → モーダルを開く -->
    <button class="post-btn-right" onclick="openModal()">ポストする</button>

  </aside>
</div>

<!-- ===== MOBILE BOTTOM NAV ===== -->
<nav class="bottom-nav">
  <a class="bottom-nav-item active" href="#">
    <span class="bn-icon">🏠</span>
    <span>TL</span>
  </a>
  <a class="bottom-nav-item" href="#">
    <span class="bn-icon">📝</span>
    <span>ログ</span>
  </a>
  <a class="bottom-nav-item" href="#">
    <span class="bn-icon">🗂️</span>
    <span>ドライブ</span>
  </a>
  <a class="bottom-nav-item" href="#profile">
    <span class="bn-icon">👤</span>
    <span>プロフィール</span>
  </a>
</nav>

<!-- ===== MOBILE FAB ===== -->
<button class="fab" onclick="openModal()" aria-label="ポストする">✏️</button>

<script>
// ===== PC インラインコンポーザー =====
function updateCharCount() {
  const ta = document.getElementById("postText");
  document.getElementById("charCount").textContent = `${ta.value.length} / 500`;
}

function submitPost() {
  const ta = document.getElementById("postText");
  if (!ta.value.trim()) return;
  ta.value = "";
  updateCharCount();
  addHeatmapPost();
}

// ===== モーダル =====
function openModal() {
  document.getElementById("postModal").classList.add("open");
  setTimeout(() => document.getElementById("modalPostText").focus(), 50);
}

function closeModal() {
  document.getElementById("postModal").classList.remove("open");
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById("postModal")) closeModal();
}

function updateModalCharCount() {
  const ta = document.getElementById("modalPostText");
  document.getElementById("modalCharCount").textContent = `${ta.value.length} / 500`;
}

function submitModalPost() {
  const ta = document.getElementById("modalPostText");
  if (!ta.value.trim()) return;
  ta.value = "";
  updateModalCharCount();
  closeModal();
  addHeatmapPost();
}

// Escキーで閉じる
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

// ===== MEMO =====
function saveMemo() {
  localStorage.setItem("memo", document.getElementById("memoText").value);
  const btn = document.getElementById("saveMemoBtn");
  btn.textContent = "保存済み ✓";
  setTimeout(() => btn.textContent = "保存", 1500);
}

function clearMemo() {
  document.getElementById("memoText").value = "";
  localStorage.removeItem("memo");
}

window.addEventListener("load", () => {
  const saved = localStorage.getItem("memo");
  if (saved) document.getElementById("memoText").value = saved;
});

// ===== HEATMAP =====
const heatmapData = {};
const today = new Date();

function dateKey(d) {
  return d.toISOString().split("T")[0];
}

function addHeatmapPost() {
  buildHeatmap();
}

function buildHeatmap() {
  const container = document.getElementById("heatmapGrid");
  if (!container) return;
  const outer = container.parentElement;
  const outerW = outer.clientWidth;

  const ROWS = 5;
  const COLS = 15;
  const gap = 4;
  const cellSize = Math.max(8, Math.floor((outerW - gap * (COLS - 1)) / COLS));
  const totalW = cellSize * COLS + gap * (COLS - 1);

  container.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
  container.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;
  container.style.gap = gap + "px";
  container.style.width = totalW + "px";
  container.innerHTML = "";

  const totalDays = COLS * ROWS;
  const startDate = new Date(today);
  startDate.setDate(startDate.getDate() - (totalDays - 1));

  const fmt = d =>
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const rangeEl = document.getElementById("heatmapRange");
  if (rangeEl) rangeEl.textContent = `${fmt(startDate)} ～ ${fmt(today)}`;

  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      const d = new Date(startDate);
      d.setDate(d.getDate() + col * ROWS + row);

      const cell = document.createElement("div");
      cell.style.gridColumn = col + 1;
      cell.style.gridRow = row + 1;
      cell.style.width = cellSize + "px";
      cell.style.height = cellSize + "px";

      if (d > today) {
        container.appendChild(cell);
        continue;
      }

      const k = dateKey(d);
      const level = heatmapData[k] || 0;
      cell.className = "heatmap-cell";
      cell.innerHTML = `<span class="tooltip">${k}: ${level}件</span>`;
      container.appendChild(cell);
    }
  }
}

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildHeatmap, 80);
});

// ===== INIT =====
buildHeatmap();
</script>
</body>
</html>
